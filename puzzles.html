<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambit · Puzzle</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♞</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f1a; color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  }
  header {
    width: 100%; padding: 16px 24px; background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; }
  nav { margin-left: auto; display: flex; gap: 8px; }
  nav a {
    color: #aaa; text-decoration: none; font-size: 0.85rem;
    padding: 6px 14px; border-radius: 6px; border: 1px solid #2a2a4a;
    transition: background 0.15s, color 0.15s;
  }
  nav a:hover { background: #2a2a4a; color: #e0e0e0; }
  nav a.active { background: #e94560; color: #fff; border-color: #e94560; }

  main {
    display: flex; gap: 24px; padding: 32px 24px;
    align-items: flex-start; flex-wrap: wrap; justify-content: center;
  }

  /* ── Board ── */
  #board-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .rank-labels, .file-labels { display: flex; color: #888; font-size: 0.7rem; font-weight: 600; user-select: none; }
  .rank-labels { flex-direction: column; justify-content: space-around; width: 16px; }
  .rank-labels span { height: 70px; display: flex; align-items: center; justify-content: center; }
  .file-labels { width: 560px; justify-content: space-around; padding: 0 0 0 16px; }
  .file-labels span { width: 70px; text-align: center; }
  #board-row { display: flex; }
  #board {
    display: grid;
    grid-template-columns: repeat(8, 70px);
    grid-template-rows: repeat(8, 70px);
    border: 2px solid #3a3a5a; border-radius: 4px;
    overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .sq {
    width: 70px; height: 70px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; position: relative;
    transition: filter 0.1s; user-select: none; -webkit-user-select: none;
  }
  .sq img { width: 82%; height: 82%; pointer-events: none; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }
  .sq:hover { filter: brightness(1.15); }
  .sq.light { background: #f0d9b5; }
  .sq.dark  { background: #b58863; }
  .sq.selected   { background: #7fc97f !important; }
  .sq.last-move  { background: #cdd16e !important; }
  .sq.check      { background: #e05555 !important; }
  .sq.correct    { background: #4caf50 !important; }
  .sq.legal-move::after {
    content: ''; position: absolute; width: 20px; height: 20px;
    background: rgba(0,0,0,0.25); border-radius: 50%; pointer-events: none;
  }
  .sq.legal-capture::after {
    content: ''; position: absolute; inset: 0;
    border: 5px solid rgba(0,0,0,0.25); pointer-events: none;
  }

  /* ── Move progress track ── */
  #move-track {
    display: flex; gap: 6px; align-items: center; padding: 4px 0;
    min-height: 24px;
  }
  .track-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #2a2a4a; border: 2px solid #3a3a5a;
    transition: background 0.2s, border-color 0.2s;
  }
  .track-dot.done    { background: #4caf50; border-color: #4caf50; }
  .track-dot.current { background: #e94560; border-color: #e94560; }

  /* ── Sidebar ── */
  #sidebar { width: 260px; display: flex; flex-direction: column; gap: 16px; }
  .panel {
    background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 10px; padding: 16px;
  }
  .panel-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 10px; }
  #puzzle-date { font-size: 0.8rem; color: #666; margin-bottom: 4px; }
  #puzzle-turn { font-size: 1rem; font-weight: 600; }
  #puzzle-progress { font-size: 0.8rem; color: #888; margin-top: 4px; }

  #status-area { min-height: 2.5em; font-size: 0.9rem; line-height: 1.5; }
  #status-area.correct { color: #4caf50; }
  #status-area.wrong   { color: #e05555; }
  #status-area.info    { color: #888; }
  #status-area.engine  { color: #f0a500; font-style: italic; }

  button {
    background: #e94560; color: white; border: none; border-radius: 6px;
    padding: 9px 14px; cursor: pointer; font-size: 0.875rem; font-weight: 600;
    transition: background 0.15s, transform 0.1s; width: 100%;
  }
  button:hover  { background: #c73652; }
  button:active { transform: scale(0.97); }
  button.secondary { background: #2a2a4a; color: #c0c0e0; }
  button.secondary:hover { background: #3a3a5a; }
  button:disabled { background: #333; color: #666; cursor: default; transform: none; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row button { flex: 1; }

  /* Solution replay moves */
  #solution-line {
    display: none; margin-top: 10px;
    padding: 10px; background: #0f0f1a;
    border-radius: 6px; font-size: 0.85rem; line-height: 1.8;
  }
  #solution-line.visible { display: block; }
  .sol-player { color: #e0e0e0; font-weight: 700; }
  .sol-engine { color: #666; }

  /* Loading states */
  #loading {
    position: fixed; inset: 0; background: #0f0f1a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 100; font-size: 1rem; color: #888;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid #2a2a4a;
    border-top-color: #e94560; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #generating {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; padding: 40px;
    color: #666; font-size: 0.9rem; width: 100%;
  }
  #generating.visible { display: flex; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.4s ease; }

  @media (max-width: 640px) {
    main { padding: 16px 8px; gap: 16px; }
    #board { grid-template-columns: repeat(8, 44px); grid-template-rows: repeat(8, 44px); }
    .sq { width: 44px; height: 44px; }
    .file-labels { width: 352px; }
    .file-labels span { width: 44px; }
    .rank-labels span { height: 44px; }
    #sidebar { width: 352px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading Gambit engine…</span>
</div>

<header>
  <img src="https://lichess1.org/assets/piece/cburnett/wN.svg" style="height:32px;width:32px" alt="knight">
  <h1>Gambit</h1>
  <nav>
    <a href="index.html">Play</a>
    <a href="analysis.html">Analysis</a>
    <a href="puzzles.html" class="active">Puzzle</a>
  </nav>
</header>

<main>
  <div id="board-wrap">
    <div id="move-track"></div>
    <div class="file-labels" id="file-labels">
      <span>a</span><span>b</span><span>c</span><span>d</span>
      <span>e</span><span>f</span><span>g</span><span>h</span>
    </div>
    <div id="board-row">
      <div class="rank-labels" id="rank-labels">
        <span>8</span><span>7</span><span>6</span><span>5</span>
        <span>4</span><span>3</span><span>2</span><span>1</span>
      </div>
      <div id="board"></div>
    </div>
    <div id="generating">
      <div class="spinner"></div>
      <span id="generating-text">Generating puzzle…</span>
    </div>
  </div>

  <div id="sidebar">
    <div class="panel">
      <div class="panel-title">Puzzle of the Day</div>
      <div id="puzzle-date"></div>
      <div id="puzzle-turn"></div>
      <div id="puzzle-progress"></div>
      <div id="puzzle-timer" style="margin-top:6px;font-family:'SF Mono',Menlo,monospace;font-size:0.85rem;color:#aaa;">0:00</div>
    </div>

    <div class="panel">
      <div class="panel-title">Stats</div>
      <div id="stat-row" style="display:flex;gap:14px;font-size:0.85rem;">
        <div><span style="color:#666;display:block;font-size:0.7rem;">STREAK</span><span id="stat-streak" style="font-weight:700;color:#f0a500;">0</span></div>
        <div><span style="color:#666;display:block;font-size:0.7rem;">SOLVED</span><span id="stat-solved" style="font-weight:700;color:#4caf50;">0</span></div>
        <div><span style="color:#666;display:block;font-size:0.7rem;">FAILED</span><span id="stat-failed" style="font-weight:700;color:#e05555;">0</span></div>
        <div><span style="color:#666;display:block;font-size:0.7rem;">BEST</span><span id="stat-best" style="font-weight:700;">—</span></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Status</div>
      <div id="status-area" class="info">Find the best move.</div>
      <div id="solution-line"></div>
    </div>

    <div class="panel">
      <div class="btn-row">
        <button id="btn-hint"     class="secondary">Hint</button>
        <button id="btn-solution" class="secondary">Solution</button>
      </div>
      <div style="margin-top:10px">
        <button id="btn-next">New Puzzle</button>
      </div>
    </div>
  </div>
</main>

<script type="module">
import { Chess } from 'https://esm.sh/chess.js@1';

const PIECE_URL = (c, t) => `https://lichess1.org/assets/piece/cburnett/${c}${t.toUpperCase()}.svg`;

// ── State ─────────────────────────────────────────────────────────────────────
let chess       = null;
let puzzle      = null;   // { fen, turn, line: [{uci,san,isPlayer,isCheckmate}], gain, isCheckmate }
let lineIdx     = 0;      // current position in puzzle.line
let playerMoves = [];     // just the player-move steps, for progress display
let playerStep  = 0;      // how many player moves solved so far
let solved      = false;
let revealed    = false;
let selected    = null;
let legalDests  = [];
let lastMove    = null;
let flipped     = false;
let puzzleOffset = 0;
let enginePlaying = false; // debounce during engine auto-reply
let dragState = null;
let failed = false;     // current puzzle counted as failure
let startTime = 0;      // ms timestamp puzzle started
let timerInterval = null;

// ── Stats (localStorage) ─────────────────────────────────────────────────────
function loadStats() {
  try { return JSON.parse(localStorage.getItem('gambit_puzzle_stats') || '{}'); }
  catch { return {}; }
}
function saveStats(s) { localStorage.setItem('gambit_puzzle_stats', JSON.stringify(s)); }
function renderStats() {
  const s = loadStats();
  document.getElementById('stat-streak').textContent = s.streak || 0;
  document.getElementById('stat-solved').textContent = s.solved || 0;
  document.getElementById('stat-failed').textContent = s.failed || 0;
  document.getElementById('stat-best').textContent   = s.bestStreak || s.streak || 0;
}
function recordSolve(timeSec) {
  const s = loadStats();
  s.solved = (s.solved || 0) + 1;
  s.streak = (s.streak || 0) + 1;
  s.bestStreak = Math.max(s.bestStreak || 0, s.streak);
  s.lastSolveDate = new Date().toISOString().slice(0, 10);
  if (!s.fastest || timeSec < s.fastest) s.fastest = timeSec;
  saveStats(s); renderStats();
}
function recordFail() {
  const s = loadStats();
  s.failed = (s.failed || 0) + 1;
  s.streak = 0;
  saveStats(s); renderStats();
}
renderStats();

function startTimer() {
  startTime = performance.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 200);
  updateTimer();
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function updateTimer() {
  const sec = Math.floor((performance.now() - startTime) / 1000);
  const m = Math.floor(sec / 60), r = sec % 60;
  document.getElementById('puzzle-timer').textContent = m + ':' + String(r).padStart(2, '0');
}
function elapsedSec() { return Math.floor((performance.now() - startTime) / 1000); }

// ── Date seed ─────────────────────────────────────────────────────────────────
function dateSeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}
function puzzleSeed() { return dateSeed() + puzzleOffset * 1000003; }

// Preload piece SVGs so the first paint shows pieces, not empty squares.
const PIECE_PRELOAD = (() => {
  const promises = [];
  for (const c of ['w', 'b']) {
    for (const t of ['p', 'n', 'b', 'r', 'q', 'k']) {
      promises.push(new Promise(res => {
        const img = new Image();
        img.onload = img.onerror = () => res();
        img.src = PIECE_URL(c, t);
      }));
    }
  }
  return Promise.all(promises);
})();

// Paint an empty board immediately so axes wrap a real board during load,
// not a 0-height collapsed container.
renderEmptyBoard();

// ── Worker ────────────────────────────────────────────────────────────────────
const worker = new Worker('./puzzle_worker.js', { type: 'module' });
worker.onmessage = async (e) => {
  if (e.data.type === 'ready') {
    await PIECE_PRELOAD;
    document.getElementById('loading').style.display = 'none';
    loadPuzzle();
  }
  if (e.data.type === 'puzzle') onPuzzleReady(e.data.puzzle);
  if (e.data.type === 'error')  showGeneratingText('Failed to generate puzzle. Try "New Puzzle".');
};
worker.onerror = () => showGeneratingText('Engine error. Please reload.');

// ── Load / cache ──────────────────────────────────────────────────────────────
function loadPuzzle() {
  const today    = new Date().toISOString().slice(0, 10);
  const cacheKey = `gambit_puzzle_${today}_${puzzleOffset}`;
  const cached   = localStorage.getItem(cacheKey);

  setGenerating(true, 'Generating puzzle…');
  renderEmptyBoard();

  if (cached) {
    try { onPuzzleReady(JSON.parse(cached)); return; }
    catch(e) { localStorage.removeItem(cacheKey); }
  }
  worker.postMessage({ type: 'generate', seed: puzzleSeed() });
}

function onPuzzleReady(p) {
  if (!p || !p.line || !p.line.length) {
    showGeneratingText('Could not find a puzzle. Try "New Puzzle".');
    return;
  }

  const today    = new Date().toISOString().slice(0, 10);
  const cacheKey = `gambit_puzzle_${today}_${puzzleOffset}`;
  try { localStorage.setItem(cacheKey, JSON.stringify(p)); } catch(e) {}

  puzzle    = p;
  lineIdx   = 0;
  playerMoves = p.line.filter(m => m.isPlayer);
  playerStep  = 0;
  solved    = false;
  revealed  = false;
  selected  = null;
  legalDests = [];
  lastMove  = null;
  flipped   = p.turn === 'b';
  enginePlaying = false;

  chess = new Chess();
  chess.load(p.fen);

  failed = false;
  startTimer();

  setGenerating(false);
  renderPuzzleInfo();
  renderTrack();
  renderBoard();
  updateStatus('Find the best move.', 'info');
  resetButtons();
  document.getElementById('solution-line').classList.remove('visible');
  document.getElementById('solution-line').innerHTML = '';
}

// ── Puzzle info ───────────────────────────────────────────────────────────────
function renderPuzzleInfo() {
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('puzzle-date').textContent =
    puzzleOffset === 0 ? today : `Puzzle #${puzzleOffset + 1} — ${today}`;

  const color = puzzle.turn === 'w' ? 'White' : 'Black';
  const suffix = puzzle.isCheckmate ? ' — find checkmate'
    : puzzle.gain > 600 ? ' — win material decisively'
    : puzzle.gain > 200 ? ' — find the tactic'
    : '';
  document.getElementById('puzzle-turn').textContent = `${color} to move${suffix}`;
  updateProgress();
}

function updateProgress() {
  const total = playerMoves.length;
  document.getElementById('puzzle-progress').textContent =
    total > 1 ? `Move ${Math.min(playerStep + 1, total)} of ${total}` : '';
}

// ── Move progress dots ────────────────────────────────────────────────────────
function renderTrack() {
  const track = document.getElementById('move-track');
  track.innerHTML = '';
  playerMoves.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'track-dot' + (i < playerStep ? ' done' : i === playerStep ? ' current' : '');
    track.appendChild(dot);
  });
}

// ── Board rendering ───────────────────────────────────────────────────────────
function renderBoard() {
  if (!chess) return;
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  const inCheckSq = chess.inCheck() ? kingSquare(chess.turn()) : null;

  for (let vr = 0; vr < 8; vr++) {
    for (let vc = 0; vc < 8; vc++) {
      const rank = flipped ? vr + 1 : 8 - vr;
      const file = flipped ? 8 - vc : vc + 1;
      const sq   = 'abcdefgh'[file - 1] + rank;

      const div = document.createElement('div');
      div.className = 'sq ' + ((rank + file) % 2 === 0 ? 'dark' : 'light');
      div.dataset.sq = sq;

      if (sq === selected) div.classList.add('selected');
      else if (lastMove && (sq === lastMove.from || sq === lastMove.to)) div.classList.add('last-move');
      if (sq === inCheckSq) div.classList.add('check');
      if (legalDests.includes(sq)) div.classList.add(chess.get(sq) ? 'legal-capture' : 'legal-move');

      const piece = chess.get(sq);
      if (piece) {
        const img = document.createElement('img');
        img.src  = PIECE_URL(piece.color, piece.type);
        img.alt  = piece.color + piece.type;
        div.appendChild(img);
      }

      const interactive = !solved && !revealed && !enginePlaying && chess.turn() === puzzle?.turn;
      if (interactive) {
        div.addEventListener('pointerdown', (ev) => onPointerDown(ev, sq));
      }
      boardEl.appendChild(div);
    }
  }

  const files = flipped ? ['h','g','f','e','d','c','b','a'] : ['a','b','c','d','e','f','g','h'];
  const ranks = flipped ? ['1','2','3','4','5','6','7','8'] : ['8','7','6','5','4','3','2','1'];
  document.querySelectorAll('#file-labels span').forEach((el, i) => el.textContent = files[i]);
  document.querySelectorAll('#rank-labels span').forEach((el, i) => el.textContent = ranks[i]);
}

function renderEmptyBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let i = 0; i < 64; i++) {
    const div = document.createElement('div');
    div.className = 'sq ' + ((Math.floor(i/8) + i%8) % 2 === 0 ? 'light' : 'dark');
    boardEl.appendChild(div);
  }
}

// ── Pointer (click + drag) ──────────────────────────────────────────────────
function onPointerDown(ev, sq) {
  if (!chess || !puzzle || solved || revealed || enginePlaying) return;
  if (chess.turn() !== puzzle.turn) return;
  if (ev.button !== undefined && ev.button !== 0) return;
  ev.preventDefault();

  const piece = chess.get(sq);

  if (selected && legalDests.includes(sq)) {
    attemptPlayerMove(selected, sq);
    return;
  }
  if (piece && piece.color === puzzle.turn) {
    selected   = sq;
    legalDests = chess.moves({ square: sq, verbose: true }).map(m => m.to);
    renderBoard();
    startDrag(ev, sq, piece);
    return;
  }
  selected   = null;
  legalDests = [];
  renderBoard();
}

function startDrag(ev, sq, piece) {
  const ghost = document.createElement('div');
  ghost.style.cssText = 'position:fixed;width:70px;height:70px;pointer-events:none;z-index:1000;transform:translate(-50%,-50%);';
  const img = document.createElement('img');
  img.src = PIECE_URL(piece.color, piece.type);
  img.style.cssText = 'width:100%;height:100%;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.5));';
  ghost.appendChild(img);
  document.body.appendChild(ghost);
  ghost.style.left = ev.clientX + 'px';
  ghost.style.top  = ev.clientY + 'px';
  dragState = { from: sq };

  const onMove = (e) => {
    ghost.style.left = e.clientX + 'px';
    ghost.style.top  = e.clientY + 'px';
  };
  const onUp = (e) => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    ghost.remove();
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const targetSq = target && target.closest('.sq') ? target.closest('.sq').dataset.sq : null;
    const fromSq = dragState.from;
    dragState = null;
    if (targetSq && targetSq !== fromSq && legalDests.includes(targetSq)) {
      attemptPlayerMove(fromSq, targetSq);
    }
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

function attemptPlayerMove(from, to) {
  const step = puzzle.line[lineIdx];
  if (!step || !step.isPlayer) return;

  const correctUci = step.uci.slice(0, 4);
  const playedUci  = from + to;

  // Apply move temporarily to validate
  let moveObj;
  try { moveObj = chess.move({ from, to, promotion: step.uci[4] || 'q' }); }
  catch(e) { return; }
  if (!moveObj) return;

  if (playedUci === correctUci) {
    // Correct player move
    lastMove   = { from, to };
    selected   = null;
    legalDests = [];
    lineIdx++;
    playerStep++;
    renderTrack();
    updateProgress();

    if (lineIdx >= puzzle.line.length) {
      // All moves done — puzzle solved
      finishPuzzle(from, to);
    } else {
      // Engine responds next
      renderBoard();
      updateStatus('Good move! Engine responds…', 'engine');
      enginePlaying = true;
      setTimeout(() => playEngineMove(), 700);
    }
  } else {
    // Wrong — undo, count failure once per puzzle
    chess.undo();
    lastMove   = null;
    renderBoard();
    shakeBoard();
    if (!failed) { failed = true; recordFail(); }
    updateStatus('Not the best move. Try again.', 'wrong');
    setTimeout(() => updateStatus('Find the best move.', 'info'), 1500);
  }
}

function playEngineMove() {
  const step = puzzle.line[lineIdx];
  if (!step || step.isPlayer) { enginePlaying = false; renderBoard(); return; }

  try {
    const moveObj = chess.move({ from: step.uci.slice(0,2), to: step.uci.slice(2,4), promotion: step.uci[4] || 'q' });
    if (moveObj) lastMove = { from: step.uci.slice(0,2), to: step.uci.slice(2,4) };
  } catch(e) {}

  lineIdx++;
  enginePlaying = false;

  if (lineIdx >= puzzle.line.length) {
    finishPuzzle(lastMove?.from, lastMove?.to);
  } else {
    renderBoard();
    updateStatus('Your turn — find the next move.', 'info');
  }
}

function finishPuzzle(from, to) {
  solved = true;
  stopTimer();
  if (!failed) recordSolve(elapsedSec());
  selected = null;
  legalDests = [];
  renderBoard();
  // Light up destination square green
  setTimeout(() => {
    const dest = puzzle.line[puzzle.line.length - 1]?.uci.slice(2, 4);
    const el = dest && document.querySelector(`[data-sq="${dest}"]`);
    if (el) { el.classList.remove('last-move'); el.classList.add('correct'); }
  }, 50);

  const msg = puzzle.line[puzzle.line.length - 1]?.isCheckmate
    ? 'Checkmate! Brilliant solve.'
    : playerMoves.length > 1
      ? `Solved in ${playerMoves.length} moves!`
      : 'Correct! Well played.';
  updateStatus(msg, 'correct');
  document.getElementById('btn-hint').disabled = true;
  document.getElementById('btn-solution').disabled = true;
}

// ── Hint / Solution ───────────────────────────────────────────────────────────
document.getElementById('btn-hint').onclick = () => {
  if (!puzzle || solved || revealed) return;
  const step = puzzle.line[lineIdx];
  if (!step || !step.isPlayer) return;
  const from = step.uci.slice(0, 2);
  selected   = from;
  legalDests = chess ? chess.moves({ square: from, verbose: true }).map(m => m.to) : [];
  renderBoard();
  updateStatus(`Hint: move the piece on ${from.toUpperCase()}.`, 'info');
};

document.getElementById('btn-solution').onclick = () => {
  if (!puzzle) return;
  revealed  = true;
  enginePlaying = false;
  selected  = null;
  legalDests = [];
  stopTimer();
  if (!failed && !solved) { failed = true; recordFail(); }
  document.getElementById('btn-hint').disabled     = true;
  document.getElementById('btn-solution').disabled = true;

  // Replay full line on board (show last player move highlighted)
  const tempChess = new Chess();
  tempChess.load(puzzle.fen);
  let lastPlayerFrom, lastPlayerTo;
  for (const m of puzzle.line) {
    try { tempChess.move({ from: m.uci.slice(0,2), to: m.uci.slice(2,4), promotion: m.uci[4] || 'q' }); } catch(e) {}
    if (m.isPlayer) { lastPlayerFrom = m.uci.slice(0,2); lastPlayerTo = m.uci.slice(2,4); }
  }

  // Show final board state
  chess = tempChess;
  lastMove = lastPlayerFrom ? { from: lastPlayerFrom, to: lastPlayerTo } : null;
  renderBoard();

  // Show move list
  const lineEl = document.getElementById('solution-line');
  let html = '<b>Solution:</b><br>';
  let moveNum = 1;
  let i = 0;
  while (i < puzzle.line.length) {
    const wm = puzzle.line[i];
    const bm = puzzle.line[i + 1];
    if (wm?.isPlayer) {
      html += `${moveNum}. <span class="sol-player">${wm.san}</span>`;
      if (bm && !bm.isPlayer) html += ` <span class="sol-engine">${bm.san}</span>`;
      html += ' ';
      i += bm && !bm.isPlayer ? 2 : 1;
    } else {
      html += `${moveNum}. … <span class="sol-engine">${wm.san}</span> `;
      i++;
    }
    moveNum++;
  }
  lineEl.innerHTML = html;
  lineEl.classList.add('visible');
  updateStatus('Solution revealed.', 'info');
};

document.getElementById('btn-next').onclick = () => {
  puzzleOffset++;
  document.getElementById('solution-line').classList.remove('visible');
  loadPuzzle();
};

// ── UI helpers ────────────────────────────────────────────────────────────────
function updateStatus(msg, cls) {
  const el = document.getElementById('status-area');
  el.className = cls || 'info';
  el.textContent = msg;
}

function setGenerating(active, msg) {
  document.getElementById('generating').classList.toggle('visible', active);
  document.getElementById('board').style.display = active ? 'none' : 'grid';
  document.getElementById('move-track').style.display = active ? 'none' : 'flex';
  if (msg) document.getElementById('generating-text').textContent = msg;
}

function showGeneratingText(msg) {
  setGenerating(true, msg);
  const sp = document.querySelector('#generating .spinner');
  if (sp) sp.style.display = 'none';
}

function resetButtons() {
  document.getElementById('btn-hint').disabled     = false;
  document.getElementById('btn-solution').disabled = false;
}

function shakeBoard() {
  const el = document.getElementById('board');
  el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
}

function kingSquare(color) {
  for (const f of 'abcdefgh') for (const r of '12345678') {
    const p = chess.get(f + r);
    if (p && p.type === 'k' && p.color === color) return f + r;
  }
  return null;
}
