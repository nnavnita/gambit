<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambit · Analysis</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 24px;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header img { height: 28px; width: 28px; }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  nav { margin-left: auto; display: flex; gap: 8px; }
  nav a {
    color: #aaa;
    text-decoration: none;
    font-size: 0.85rem;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #2a2a4a;
    transition: background 0.15s, color 0.15s;
  }
  nav a:hover { background: #2a2a4a; color: #e0e0e0; }
  nav a.active { background: #e94560; color: #fff; border-color: #e94560; }

  /* ── Input bar ── */
  #input-bar {
    padding: 16px 24px;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  #input-bar label { font-size: 0.85rem; color: #aaa; }
  input[type=text], select {
    background: #0f0f1a;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 7px 12px;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, select:focus { border-color: #e94560; }
  input#username { width: 180px; }
  select { cursor: pointer; }
  button {
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #c73652; }
  button:disabled { background: #444; cursor: default; }
  #fetch-status { font-size: 0.8rem; color: #888; }

  /* ── Main layout ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Game list ── */
  #game-list {
    width: 270px;
    min-width: 270px;
    background: #12121f;
    border-right: 1px solid #2a2a4a;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  #game-list-header {
    padding: 12px 14px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #555;
    border-bottom: 1px solid #2a2a4a;
    position: sticky;
    top: 0;
    background: #12121f;
  }
  .game-item {
    padding: 10px 14px;
    border-bottom: 1px solid #1e1e30;
    cursor: pointer;
    transition: background 0.12s;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2px 8px;
    align-items: start;
  }
  .game-item:hover { background: #1a1a2e; }
  .game-item.selected { background: #1e1e3a; border-left: 3px solid #e94560; }
  .game-opponent { font-size: 0.85rem; font-weight: 600; }
  .game-result {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .game-result.win  { background: #1a3a1a; color: #4caf50; }
  .game-result.loss { background: #3a1a1a; color: #e05555; }
  .game-result.draw { background: #2a2a2a; color: #888; }
  .game-meta { font-size: 0.72rem; color: #666; grid-column: 1/-1; }
  .game-opening { font-size: 0.72rem; color: #556; font-style: italic; grid-column: 1/-1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #no-games { padding: 24px; color: #555; font-size: 0.85rem; text-align: center; }

  /* ── Analysis area ── */
  #analysis-area {
    flex: 1;
    display: flex;
    gap: 0;
    overflow: hidden;
    min-width: 0;
  }

  /* ── Board section ── */
  #board-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 10px;
    flex-shrink: 0;
  }

  #player-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    width: 400px;
    max-width: 100%;
  }
  .player-name { font-weight: 600; }
  .player-rating { color: #888; font-size: 0.75rem; }
  .player-color { width: 14px; height: 14px; border-radius: 2px; border: 1px solid #555; flex-shrink: 0; }
  .player-color.white-piece { background: #f0d9b5; }
  .player-color.black-piece { background: #333; }

  #board-with-eval {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  #eval-bar-wrap {
    width: 20px;
    height: 400px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  #eval-bar-black {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: #222;
    transition: height 0.4s ease;
  }
  #eval-bar-white {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #f0d9b5;
    transition: height 0.4s ease;
  }
  #eval-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.55rem;
    font-weight: 700;
    color: #aaa;
    z-index: 1;
    writing-mode: vertical-rl;
    white-space: nowrap;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 50px);
    grid-template-rows: repeat(8, 50px);
    border: 2px solid #3a3a5a;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 6px 30px rgba(0,0,0,0.5);
  }
  .sq {
    width: 50px; height: 50px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    user-select: none;
  }
  .sq.light { background: #f0d9b5; }
  .sq.dark  { background: #b58863; }
  .sq.last-move { background: #cdd16e !important; }
  .sq.annotated::after {
    content: attr(data-ann);
    position: absolute;
    bottom: 2px; right: 3px;
    font-size: 13px;
    font-weight: 900;
    line-height: 1;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.6);
    z-index: 2;
  }
  .sq.sq-ann-blunder::after    { color: #ff4444; }
  .sq.sq-ann-mistake::after    { color: #ffaa00; }
  .sq.sq-ann-inaccuracy::after { color: #aaaaff; }
  .sq.sq-ann-best::after       { color: #44dd44; }
  .sq img { width: 82%; height: 82%; pointer-events: none; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }

  /* ── Move list panel ── */
  #move-panel {
    width: 280px;
    min-width: 240px;
    background: #12121f;
    border-left: 1px solid #2a2a4a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #move-panel-header {
    padding: 12px 14px;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #move-panel-header span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #555; }
  #accuracy-display { font-size: 0.75rem; color: #aaa; }
  #accuracy-display b { color: #e0e0e0; }

  #move-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .move-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr;
    gap: 0;
    align-items: stretch;
  }
  .move-num {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 4px 6px;
    color: #444;
    font-size: 0.75rem;
  }
  .move-cell {
    padding: 4px 8px;
    font-size: 0.82rem;
    cursor: pointer;
    border-radius: 4px;
    margin: 1px 2px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.1s;
    min-height: 26px;
  }
  .move-cell:hover { background: #2a2a4a; }
  .move-cell.active { background: #2a2a4a; outline: 1px solid #e94560; }
  .move-san { flex: 1; }
  .move-ann {
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .ann-blunder   { color: #e05555; }
  .ann-mistake   { color: #f0a500; }
  .ann-inaccuracy{ color: #8888ff; }
  .ann-best      { color: #4caf50; }

  .move-cell.bg-blunder    { background: rgba(224,85,85,0.18); border-left: 3px solid #e05555; }
  .move-cell.bg-mistake    { background: rgba(240,165,0,0.15); border-left: 3px solid #f0a500; }
  .move-cell.bg-inaccuracy { background: rgba(136,136,255,0.12); border-left: 3px solid #8888ff; }

  .move-ann { font-size: 0.82rem; font-weight: 800; flex-shrink: 0; }

  .move-eval {
    font-size: 0.68rem;
    color: #555;
    flex-shrink: 0;
  }


  #progress-wrap {
    padding: 12px 14px;
    border-top: 1px solid #2a2a4a;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  #progress-wrap.visible { display: flex; }
  #progress-text { font-size: 0.75rem; color: #888; }
  #progress-bar-bg {
    height: 4px;
    background: #2a2a4a;
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: #e94560;
    border-radius: 2px;
    transition: width 0.2s;
    width: 0%;
  }

  /* ── Eval graph ── */
  #eval-graph {
    display: block;
    width: 100%;
    height: 80px;
    border-bottom: 1px solid #2a2a4a;
    background: #0d0d18;
    cursor: pointer;
  }

  /* ── Accuracy section ── */
  #accuracy-section {
    border-bottom: 1px solid #2a2a4a;
  }
  .acc-label {
    text-align: center;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #555;
    padding: 8px 0 4px;
  }
  .acc-row {
    display: flex;
  }
  .acc-block {
    flex: 1;
    text-align: center;
    padding: 6px 8px 10px;
    background: #f0d9b5;
  }
  .acc-block.acc-black {
    background: #1a1a1a;
  }
  .acc-block .acc-name {
    font-size: 0.7rem;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .acc-block .acc-pct {
    font-size: 1.3rem;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.2;
  }
  .acc-block.acc-black .acc-name { color: #666; }
  .acc-block.acc-black .acc-pct  { color: #e0e0e0; }

  /* ── Classification table ── */
  .class-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    border-bottom: 1px solid #2a2a4a;
  }
  .class-table thead th {
    padding: 6px 10px;
    font-size: 0.68rem;
    color: #555;
    font-weight: 400;
    text-align: center;
  }
  .class-table thead th:first-child { text-align: right; }
  .class-table thead th:last-child  { text-align: left; }
  .class-table tbody td {
    padding: 4px 10px;
    text-align: center;
    font-weight: 600;
    color: #ccc;
  }
  .class-table tbody td:first-child { text-align: right; }
  .class-table tbody td:last-child  { text-align: left; }
  .class-table tbody tr:hover { background: #1a1a2e; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .badge-best       { background: rgba(76,175,80,0.15);  color: #4caf50; }
  .badge-inaccuracy { background: rgba(136,136,255,0.15); color: #8888ff; }
  .badge-mistake    { background: rgba(240,165,0,0.15);  color: #f0a500; }
  .badge-blunder    { background: rgba(224,85,85,0.15);  color: #e05555; }

  #placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #333;
    gap: 12px;
    font-size: 0.9rem;
  }
  #placeholder img { width: 60px; height: 60px; opacity: 0.2; }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0;
    background: #0f0f1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
    font-size: 1rem; color: #888;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #2a2a4a;
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #summary-bar { display: none; }
  #summary-bar.visible { display: block; }

  .blunder-sq   { background: rgba(224,85,85,0.4) !important; }
  .mistake-sq   { background: rgba(240,165,0,0.4)  !important; }
  .inaccuracy-sq{ background: rgba(136,136,255,0.4)!important; }

  /* ── Back button (mobile only) ── */
  #back-btn-mobile {
    display: none;
    align-items: center;
    gap: 6px;
    background: #2a2a4a;
    color: #c0c0e0;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    margin-bottom: 8px;
    align-self: flex-start;
  }
  #back-btn-mobile:hover { background: #3a3a5a; }

  /* ── Mobile layout ── */
  @media (max-width: 768px) {
    /* Let body scroll instead of clipping */
    body { height: auto; min-height: 100vh; overflow-y: auto; overflow-x: hidden; }

    #main { flex-direction: column; overflow: visible; height: auto; flex: none; }

    /* Game list: full width, limited height, collapsible */
    #game-list {
      width: 100%; min-width: unset;
      border-right: none; border-bottom: 1px solid #2a2a4a;
      max-height: 50vh; flex-shrink: 0;
    }
    #game-list.collapsed { display: none; }

    /* Analysis area stacks vertically */
    #analysis-area { flex-direction: column; overflow: visible; }

    /* Board section: centered, full width */
    #board-section {
      padding: 8px;
      align-items: center;
      width: 100%;
    }

    #back-btn-mobile { display: flex; }

    /* Scale board to fit screen: 40px squares */
    #board {
      grid-template-columns: repeat(8, 40px) !important;
      grid-template-rows: repeat(8, 40px) !important;
    }
    .sq { width: 40px !important; height: 40px !important; }

    /* Eval bar matches board height */
    #eval-bar-wrap { height: 320px !important; }

    /* Player bars full width */
    #player-bar, #player-bar-bottom { width: 100% !important; max-width: 100%; }

    /* Hide coord labels to save space */
    #coord-files, #coord-files-b, #coord-ranks { display: none !important; }

    /* Move panel: full width, natural height */
    #move-panel {
      width: 100%; min-width: unset;
      border-left: none; border-top: 1px solid #2a2a4a;
      max-height: none;
      flex-shrink: 0;
    }
    /* Limit move scroll height so summary stays visible */
    #move-scroll { max-height: 35vh; }

    /* Accuracy numbers slightly smaller */
    .acc-pct { font-size: 1.05rem !important; }

    /* Nav buttons row — don't overflow */
    #nav-buttons { justify-content: center; width: 100%; }

    /* Input bar */
    #input-bar { flex-wrap: wrap; gap: 6px; }
    input#username { width: 100%; }

    /* Header */
    nav { gap: 4px; }
    nav a { padding: 5px 8px; font-size: 0.78rem; }
    header h1 { font-size: 1rem; }
    header img { height: 22px; width: 22px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading Gambit engine…</span>
</div>

<header>
  <img src="https://lichess1.org/assets/piece/cburnett/bN.svg" alt="knight">
  <h1>Gambit</h1>
  <nav>
    <a href="index.html">Play</a>
    <a href="analysis.html" class="active">Analysis</a>
  </nav>
</header>

<div id="input-bar">
  <label for="username">chess.com username</label>
  <input type="text" id="username" placeholder="e.g. magnuscarlsen" autocomplete="off">
  <select id="year"></select>
  <select id="month">
    <option value="01">January</option><option value="02">February</option>
    <option value="03">March</option><option value="04">April</option>
    <option value="05">May</option><option value="06">June</option>
    <option value="07">July</option><option value="08">August</option>
    <option value="09">September</option><option value="10">October</option>
    <option value="11">November</option><option value="12">December</option>
  </select>
  <button id="fetch-btn">Fetch Games</button>
  <span id="fetch-status"></span>
</div>

<div id="main">
  <!-- Game list -->
  <div id="game-list">
    <div id="game-list-header">Games</div>
    <div id="no-games">Fetch games to begin</div>
  </div>

  <!-- Analysis area -->
  <div id="analysis-area">
    <div id="placeholder">
      <img src="https://lichess1.org/assets/piece/cburnett/bQ.svg" alt="queen">
      <span>Select a game to analyse</span>
    </div>
  </div>
</div>

<script type="module">
import { Chess } from 'https://esm.sh/chess.js@1';

// ── Constants ────────────────────────────────────────────────────────────────
const PIECE_URL = (color, type) =>
  `https://lichess1.org/assets/piece/cburnett/${color}${type.toUpperCase()}.svg`;

const ANN_BLUNDER    = { label: '??', cls: 'ann-blunder',    sqCls: 'blunder-sq',    threshold: 200 };
const ANN_MISTAKE    = { label: '?',  cls: 'ann-mistake',    sqCls: 'mistake-sq',    threshold: 100 };
const ANN_INACCURACY = { label: '?!', cls: 'ann-inaccuracy', sqCls: 'inaccuracy-sq', threshold: 50  };
const ANN_BEST       = { label: '★',  cls: 'ann-best',       sqCls: '',              threshold: -1  };

const ANALYSIS_DEPTH = 4;

// ── State ────────────────────────────────────────────────────────────────────
let currentGame = null;      // { fens, moves, evals, annotations, header }
let currentMoveIdx = 0;      // which position we're viewing (0 = start)
let analysisUsername = '';
let currentAnalysisId = 0;   // incremented each time a new game is loaded

// ── Init ─────────────────────────────────────────────────────────────────────
populateDateSelectors();

// ── Date selectors ───────────────────────────────────────────────────────────
function populateDateSelectors() {
  const now = new Date();
  const yearSel = document.getElementById('year');
  for (let y = now.getFullYear(); y >= 2010; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    yearSel.appendChild(opt);
  }
  document.getElementById('month').value =
    String(now.getMonth() + 1).padStart(2, '0');
}

// ── Fetch games ──────────────────────────────────────────────────────────────
document.getElementById('fetch-btn').onclick = fetchGames;
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchGames();
});

async function fetchGames() {
  const username = document.getElementById('username').value.trim();
  const year     = document.getElementById('year').value;
  const month    = document.getElementById('month').value;
  if (!username) return;

  analysisUsername = username.toLowerCase();
  const btn = document.getElementById('fetch-btn');
  const status = document.getElementById('fetch-status');
  btn.disabled = true;
  status.textContent = 'Fetching…';

  try {
    const url = `https://api.chess.com/pub/player/${username}/games/${year}/${month}`;
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const games = (data.games || []).filter(g => g.rules === 'chess').reverse();
    status.textContent = `${games.length} game${games.length !== 1 ? 's' : ''} found`;
    renderGameList(games, username.toLowerCase());
  } catch (err) {
    status.textContent = `Error: ${err.message}`;
    console.error(err);
  }
  btn.disabled = false;
}

function renderGameList(games, username) {
  const list = document.getElementById('game-list');
  list.innerHTML = '<div id="game-list-header">Games</div>';

  if (!games.length) {
    list.innerHTML += '<div id="no-games">No games found</div>';
    return;
  }

  games.forEach((g, i) => {
    const isWhite  = g.white.username.toLowerCase() === username;
    const opponent = isWhite ? g.black : g.white;
    const myResult = isWhite ? g.white.result : g.black.result;
    const resultLabel = myResult === 'win' ? 'W' : myResult === 'draw' ? 'D' : 'L';
    const resultCls   = myResult === 'win' ? 'win' : myResult === 'draw' ? 'draw' : 'loss';
    const date = new Date(g.end_time * 1000).toLocaleDateString();
    const tc   = formatTimeControl(g.time_control, g.time_class);
    const opening = extractOpening(g.pgn);

    const div = document.createElement('div');
    div.className = 'game-item';
    div.innerHTML = `
      <span class="game-opponent">${opponent.username} (${opponent.rating ?? '?'})</span>
      <span class="game-result ${resultCls}">${resultLabel}</span>
      <span class="game-meta">${date} · ${tc}</span>
      ${opening ? `<span class="game-opening">${opening}</span>` : ''}
    `;
    div.onclick = () => {
      document.querySelectorAll('.game-item').forEach(el => el.classList.remove('selected'));
      div.classList.add('selected');
      loadGame(g, username);
      // Collapse game list on mobile after selection
      if (window.innerWidth <= 768) {
        document.getElementById('game-list').classList.add('collapsed');
      }
    };
    list.appendChild(div);
  });
}

// ── Load & analyse game ──────────────────────────────────────────────────────
async function loadGame(gameData, username) {
  const chess = new Chess();
  try {
    chess.loadPgn(gameData.pgn);
  } catch (e) {
    console.error('PGN parse failed:', e);
    return;
  }

  const header   = chess.header();
  const isWhite  = (header.White || '').toLowerCase() === username;
  const moves    = chess.history({ verbose: true });

  // Collect FEN for each position
  const replayChess = new Chess();
  const fens = [replayChess.fen()];
  for (const mv of moves) {
    replayChess.move({ from: mv.from, to: mv.to, promotion: mv.promotion });
    fens.push(replayChess.fen());
  }

  currentGame = { fens, moves, evals: [], annotations: [], bestMoves: [], header, isWhite, gameData };
  currentMoveIdx = 0;

  showAnalysisUI();
  renderBoard(fens[0], null, null);
  updatePlayerBars(header, gameData, isWhite);
  renderMoveListSkeleton(moves);
  setEvalBar(0);

  // Run analysis
  const myId = ++currentAnalysisId;
  await analyseGame(fens, moves, isWhite, myId);
}

async function analyseGame(fens, moves, isWhite, analysisId) {
  const progressWrap = document.getElementById('progress-wrap');
  const progressText = document.getElementById('progress-text');
  const progressFill = document.getElementById('progress-bar-fill');
  if (!progressWrap) return;
  progressWrap.classList.add('visible');

  const evals = [];
  const bestMoves = [];
  for (let i = 0; i < fens.length; i++) {
    if (analysisId !== currentAnalysisId) return; // cancelled — new game selected

    progressText.textContent = `Analysing position ${i} / ${fens.length - 1}…`;
    progressFill.style.width = `${(i / (fens.length - 1)) * 100}%`;

    const { score, bestMove } = await getEval(fens[i]);
    if (analysisId !== currentAnalysisId) return; // cancelled after await

    evals.push(score);
    bestMoves.push(bestMove);
    currentGame.evals = evals;
    currentGame.bestMoves = bestMoves;

    // Update eval bar as we go
    if (i === currentMoveIdx) setEvalBar(score);
  }

  progressWrap.classList.remove('visible');
  progressFill.style.width = '100%';

  // Compute annotations
  const annotations = computeAnnotations(evals, moves, bestMoves);
  currentGame.annotations = annotations;

  renderEvalGraph(evals, annotations);
  renderMoveList(moves, evals, annotations);
  renderSummary(evals, moves, annotations);
}

async function getEval(fen) {
  return new Promise(resolve => {
    const timer = setTimeout(() => resolve({ score: 0, bestMove: '' }), 10000);
    const chess = new Chess();
    try { chess.load(fen); } catch(e) { clearTimeout(timer); resolve({ score: 0, bestMove: '' }); return; }

    // Check for game-over positions
    if (chess.isCheckmate()) {
      clearTimeout(timer);
      resolve({ score: chess.turn() === 'w' ? -90000 : 90000, bestMove: '' });
      return;
    }
    if (chess.isDraw()) { clearTimeout(timer); resolve({ score: 0, bestMove: '' }); return; }

    const pendingResolve = (result) => { clearTimeout(timer); resolve(result); };
    evalQueue.push({ fen, depth: ANALYSIS_DEPTH, resolve: pendingResolve });
    drainEvalQueue();
  });
}

// Serial queue for eval worker
const evalQueue = [];
let evalBusy = false;
let pendingEvalResolve = null;

const evalWorker = new Worker('./eval_worker.js', { type: 'module' });
evalWorker.onmessage = (e) => {
  if (e.data.type === 'ready') {
    document.getElementById('loading').style.display = 'none';
    return;
  }
  if (e.data.type === 'eval' && pendingEvalResolve) {
    const r = pendingEvalResolve;
    pendingEvalResolve = null;
    evalBusy = false;
    r({ score: e.data.score, bestMove: e.data.bestMove || '' });
    drainEvalQueue();
  }
};
evalWorker.onerror = (e) => {
  console.error('Eval worker error:', e);
  if (pendingEvalResolve) { pendingEvalResolve({ score: 0, bestMove: '' }); pendingEvalResolve = null; }
  evalBusy = false;
  drainEvalQueue();
};

function drainEvalQueue() {
  if (evalBusy || evalQueue.length === 0) return;
  evalBusy = true;
  const { fen, depth, resolve } = evalQueue.shift();
  pendingEvalResolve = resolve;
  evalWorker.postMessage({ fen, depth });
}

// ── Annotations ──────────────────────────────────────────────────────────────
function computeAnnotations(evals, moves, bestMoves) {
  const annotations = [];
  for (let i = 0; i < moves.length; i++) {
    const before = evals[i], after = evals[i + 1];
    if (before === undefined || after === undefined) { annotations.push(null); continue; }

    const isWhiteMove = moves[i].color === 'w';
    const cpLoss = isWhiteMove ? (before - after) : (after - before);

    let ann = null;
    if      (cpLoss >= ANN_BLUNDER.threshold)    ann = ANN_BLUNDER;
    else if (cpLoss >= ANN_MISTAKE.threshold)    ann = ANN_MISTAKE;
    else if (cpLoss >= ANN_INACCURACY.threshold) ann = ANN_INACCURACY;
    else if (cpLoss <= 10) {
      // Best move: played move matches engine best OR nearly zero loss
      const played = moves[i].from + moves[i].to + (moves[i].promotion || '');
      const best   = (bestMoves && bestMoves[i]) || '';
      if (!best || played === best || cpLoss <= 5) ann = ANN_BEST;
    }
    annotations.push(ann);
  }
  return annotations;
}

function winPct(cp) {
  return 50 + 50 * (2 / (1 + Math.exp(-0.00368208 * cp)) - 1);
}

function computeAccuracy(evals, moves, color) {
  let totalLoss = 0, count = 0;
  for (let i = 0; i < moves.length; i++) {
    if (moves[i].color !== color) continue;
    const before = evals[i], after = evals[i + 1];
    if (before === undefined || after === undefined) continue;
    const wpBefore = color === 'w' ? winPct(before)  : winPct(-before);
    const wpAfter  = color === 'w' ? winPct(after)   : winPct(-after);
    totalLoss += Math.max(0, wpBefore - wpAfter);
    count++;
  }
  if (count === 0) return 100;
  return Math.max(0, Math.min(100, 103.1668 * Math.exp(-0.04354 * totalLoss / count) - 3.1669));
}

function countByCategory(annotations, moves, color) {
  let best = 0, inaccuracy = 0, mistake = 0, blunder = 0;
  annotations.forEach((ann, i) => {
    if (moves[i].color !== color) return;
    if (ann === ANN_BLUNDER)    blunder++;
    else if (ann === ANN_MISTAKE)    mistake++;
    else if (ann === ANN_INACCURACY) inaccuracy++;
    else if (ann === ANN_BEST)       best++;
  });
  return { best, inaccuracy, mistake, blunder };
}

function renderEvalGraph(evals, annotations) {
  const svg = document.getElementById('eval-graph');
  if (!svg) return;
  const W = svg.clientWidth || 280, H = 80;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  const n = evals.length;
  if (n < 2) return;

  const clamp = cp => Math.max(-800, Math.min(800, cp));
  const toY = cp => H / 2 - (clamp(cp) / 800) * (H / 2 - 4);
  const toX = i => (i / (n - 1)) * W;
  const pts = evals.map((cp, i) => ({ x: toX(i), y: toY(cp) }));
  const mid = H / 2;

  // White fill
  let wp = `M ${pts[0].x} ${mid} ` + pts.map(p => `L ${p.x} ${Math.min(p.y, mid)}`).join(' ') + ` L ${pts[n-1].x} ${mid} Z`;
  const wf = document.createElementNS(ns, 'path');
  wf.setAttribute('d', wp); wf.setAttribute('fill', 'rgba(240,217,181,0.45)'); svg.appendChild(wf);

  // Black fill
  let bp = `M ${pts[0].x} ${mid} ` + pts.map(p => `L ${p.x} ${Math.max(p.y, mid)}`).join(' ') + ` L ${pts[n-1].x} ${mid} Z`;
  const bf = document.createElementNS(ns, 'path');
  bf.setAttribute('d', bp); bf.setAttribute('fill', 'rgba(30,30,30,0.7)'); svg.appendChild(bf);

  // Midline
  const ml = document.createElementNS(ns, 'line');
  ml.setAttribute('x1', 0); ml.setAttribute('y1', mid); ml.setAttribute('x2', W); ml.setAttribute('y2', mid);
  ml.setAttribute('stroke', '#2a2a4a'); ml.setAttribute('stroke-width', '1'); svg.appendChild(ml);

  // Eval line
  const pl = document.createElementNS(ns, 'polyline');
  pl.setAttribute('points', pts.map(p => `${p.x},${p.y}`).join(' '));
  pl.setAttribute('fill', 'none'); pl.setAttribute('stroke', '#c8c8c8'); pl.setAttribute('stroke-width', '1.5');
  svg.appendChild(pl);

  // Annotation dots
  annotations.forEach((ann, i) => {
    if (!ann || ann === ANN_BEST) return;
    const p = pts[i + 1]; if (!p) return;
    const dot = document.createElementNS(ns, 'circle');
    dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y); dot.setAttribute('r', '3');
    dot.setAttribute('fill', ann === ANN_BLUNDER ? '#e05555' : ann === ANN_MISTAKE ? '#f0a500' : '#8888ff');
    svg.appendChild(dot);
  });

  // Cursor line
  const cur = document.createElementNS(ns, 'line');
  cur.setAttribute('id', 'graph-cursor');
  cur.setAttribute('y1', 0); cur.setAttribute('y2', H);
  cur.setAttribute('stroke', '#e94560'); cur.setAttribute('stroke-width', '1.5'); cur.setAttribute('opacity', '0.8');
  svg.appendChild(cur);

  // Click to navigate
  svg.onclick = (e) => {
    const rect = svg.getBoundingClientRect();
    const frac = (e.clientX - rect.left) / rect.width;
    const idx = Math.round(frac * (n - 1));
    goToMove(idx);
  };

  updateGraphCursor(n);
}

function updateGraphCursor(totalPoints) {
  const cur = document.getElementById('graph-cursor');
  const svg = document.getElementById('eval-graph');
  if (!cur || !svg) return;
  const W = svg.clientWidth || 280;
  const x = totalPoints > 1 ? (currentMoveIdx / (totalPoints - 1)) * W : 0;
  cur.setAttribute('x1', x); cur.setAttribute('x2', x);
}

function uciToSan(fen, uci) {
  if (!uci || uci.length < 4) return uci;
  const c = new Chess();
  try { c.load(fen); } catch(e) { return uci; }
  try {
    const m = c.move({ from: uci.slice(0,2), to: uci.slice(2,4), promotion: uci[4] || 'q' });
    return m ? m.san : uci;
  } catch(e) { return uci; }
}

function sqCenter(sq) {
  const file = 'abcdefgh'.indexOf(sq[0]);
  const rank = 8 - parseInt(sq[1]);
  return { x: file * 50 + 25, y: rank * 50 + 25 };
}

function drawArrow(svg, fromSq, toSq, color) {
  svg.innerHTML = '';
  if (!fromSq || !toSq || fromSq === toSq) return;

  const ns = 'http://www.w3.org/2000/svg';
  const from = sqCenter(fromSq);
  const to   = sqCenter(toSq);

  const dx = to.x - from.x, dy = to.y - from.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const nx = dx / len, ny = dy / len;

  // Arrowhead marker
  const defs   = document.createElementNS(ns, 'defs');
  const marker = document.createElementNS(ns, 'marker');
  marker.setAttribute('id', 'bm-arrow');
  marker.setAttribute('markerWidth', '4');
  marker.setAttribute('markerHeight', '4');
  marker.setAttribute('refX', '2');
  marker.setAttribute('refY', '2');
  marker.setAttribute('orient', 'auto');
  const poly = document.createElementNS(ns, 'polygon');
  poly.setAttribute('points', '0 0, 4 2, 0 4');
  poly.setAttribute('fill', color);
  marker.appendChild(poly);
  defs.appendChild(marker);
  svg.appendChild(defs);

  // Shorten line so it doesn't overlap arrowhead
  const line = document.createElementNS(ns, 'line');
  line.setAttribute('x1', from.x + nx * 18);
  line.setAttribute('y1', from.y + ny * 18);
  line.setAttribute('x2', to.x   - nx * 16);
  line.setAttribute('y2', to.y   - ny * 16);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '9');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('opacity', '0.82');
  line.setAttribute('marker-end', 'url(#bm-arrow)');
  svg.appendChild(line);
}

function goToMove(idx) {
  if (!currentGame) return;
  idx = Math.max(0, Math.min(idx, currentGame.fens.length - 1));
  currentMoveIdx = idx;
  const lastMove = idx > 0 ? currentGame.moves[idx - 1] : null;
  const ann      = idx > 0 ? currentGame.annotations[idx - 1] : null;
  renderBoard(currentGame.fens[idx], lastMove, ann);
  if (currentGame.evals[idx] !== undefined) setEvalBar(currentGame.evals[idx]);
  highlightActiveMove(idx);
  updateGraphCursor(currentGame.fens.length);

  // Draw best-move arrow for annotated moves
  const svg = document.getElementById('board-arrows');
  if (svg && ann && idx > 0 && currentGame.bestMoves[idx - 1]) {
    const uci   = currentGame.bestMoves[idx - 1];
    const color = ann === ANN_BLUNDER ? '#e05555' : ann === ANN_MISTAKE ? '#f0a500' : '#8888ff';
    drawArrow(svg, uci.slice(0, 2), uci.slice(2, 4), color);
  } else if (svg) {
    svg.innerHTML = '';
  }
}

function renderBoard(fen, lastMove, ann) {
  const boardEl = document.getElementById('board');
  if (!boardEl) return;
  const chess = new Chess();
  try { chess.load(fen); } catch(e) { return; }
  boardEl.innerHTML = '';

  for (let visualRow = 0; visualRow < 8; visualRow++) {
    for (let visualCol = 0; visualCol < 8; visualCol++) {
      const rank = 8 - visualRow;
      const file = visualCol + 1;
      const sq   = 'abcdefgh'[file - 1] + rank;

      const div = document.createElement('div');
      div.className = 'sq ' + ((rank + file) % 2 === 0 ? 'dark' : 'light');

      if (lastMove && (sq === lastMove.from || sq === lastMove.to)) {
        if (ann && sq === lastMove.to) {
          if (ann.sqCls) div.classList.add(ann.sqCls);
          else div.classList.add('last-move');
          // Annotation symbol overlay
          const sqClass = ann === ANN_BLUNDER ? 'sq-ann-blunder' : ann === ANN_MISTAKE ? 'sq-ann-mistake' : ann === ANN_INACCURACY ? 'sq-ann-inaccuracy' : 'sq-ann-best';
          div.classList.add('annotated', sqClass);
          div.dataset.ann = ann.label;
        } else {
          div.classList.add('last-move');
        }
      }

      const piece = chess.get(sq);
      if (piece) {
        const img = document.createElement('img');
        img.src = PIECE_URL(piece.color, piece.type);
        img.alt = piece.color + piece.type;
        div.appendChild(img);
      }
      boardEl.appendChild(div);
    }
  }
}

function setEvalBar(cp) {
  const bar = document.getElementById('eval-bar-wrap');
  if (!bar) return;

  // Clamp and convert to percentage (sigmoid-like)
  const capped = Math.max(-2000, Math.min(2000, cp));
  const pct = 50 + 50 * Math.tanh(capped / 600); // 0–100, 50=equal
  const whitePct = pct;
  const blackPct = 100 - pct;

  const bEl = document.getElementById('eval-bar-black');
  const wEl = document.getElementById('eval-bar-white');
  if (bEl) bEl.style.height = blackPct + '%';
  if (wEl) wEl.style.height = whitePct + '%';
}

function updatePlayerBars(header, gameData, isWhite) {

  const bot = document.getElementById('player-bar-bottom'); // bottom = white

  const wName  = header.White  || gameData.white.username;
  const bName  = header.Black  || gameData.black.username;

  `;

function renderMoveListSkeleton(moves) {
  const scroll = document.getElementById('move-scroll');
  if (!scroll) return;
  scroll.innerHTML = '';
  for (let i = 0; i < moves.length; i += 2) {
    const row = document.createElement('div');
    row.className = 'move-row';
    row.innerHTML = `
      <span class="move-num">${i/2 + 1}.</span>
      <span class="move-cell" data-idx="${i + 1}" style="color:#555">${moves[i].san}</span>
      ${moves[i+1] ? `<span class="move-cell" data-idx="${i + 2}" style="color:#555">${moves[i+1].san}</span>` : '<span></span>'}
    `;
    scroll.appendChild(row);
  }
  scroll.querySelectorAll('.move-cell').forEach(el => {
    el.onclick = () => goToMove(parseInt(el.dataset.idx));
  });
}

function renderMoveList(moves, evals, annotations) {
  const scroll = document.getElementById('move-scroll');
  if (!scroll) return;
  scroll.innerHTML = '';

  for (let i = 0; i < moves.length; i += 2) {
    const row = document.createElement('div');
    row.className = 'move-row';

    const numSpan = document.createElement('span');
    numSpan.className = 'move-num';
    numSpan.textContent = i/2 + 1 + '.';
    row.appendChild(numSpan);

    for (let j = 0; j <= 1; j++) {
      const mi = i + j;
      if (mi >= moves.length) { row.appendChild(document.createElement('span')); continue; }

      const ann  = annotations[mi];
      const cp   = evals[mi + 1];
      const cell = document.createElement('span');
      const bgCls = ann === ANN_BLUNDER ? 'bg-blunder' : ann === ANN_MISTAKE ? 'bg-mistake' : ann === ANN_INACCURACY ? 'bg-inaccuracy' : ann === ANN_BEST ? '' : '';
      cell.className = 'move-cell' + (bgCls ? ' ' + bgCls : '');
      cell.dataset.idx = mi + 1;

      const sanEl = document.createElement('span');
      sanEl.className = 'move-san';
      sanEl.textContent = moves[mi].san;
      cell.appendChild(sanEl);

      if (ann) {
        const annEl = document.createElement('span');
        annEl.className = 'move-ann ' + ann.cls;
        annEl.textContent = ann.label;
        cell.appendChild(annEl);
      }

      if (cp !== undefined) {
        const evalEl = document.createElement('span');
        evalEl.className = 'move-eval';
        evalEl.textContent = formatEval(cp);
        cell.appendChild(evalEl);
      }

      cell.onclick = () => goToMove(mi + 1);
      row.appendChild(cell);
    }
    scroll.appendChild(row);
  }

  highlightActiveMove(currentMoveIdx);
}

function highlightActiveMove(idx) {
  document.querySelectorAll('.move-cell').forEach(el => el.classList.remove('active'));
  if (idx > 0) {
    const el = document.querySelector(`.move-cell[data-idx="${idx}"]`);
    if (el) {
      el.classList.add('active');
      // Scroll only within #move-scroll, never the whole page
      const container = document.getElementById('move-scroll');
      if (container) {
        const top = el.offsetTop - container.offsetTop;
        const bottom = top + el.offsetHeight;
        if (top < container.scrollTop) {
          container.scrollTop = top - 4;
        } else if (bottom > container.scrollTop + container.clientHeight) {
          container.scrollTop = bottom - container.clientHeight + 4;
        }
      }
    }
  }
}

function renderSummary(evals, moves, annotations) {
  const bar = document.getElementById('summary-bar');
  if (!bar) return;

  const wAcc = computeAccuracy(evals, moves, 'w').toFixed(1);
  const bAcc = computeAccuracy(evals, moves, 'b').toFixed(1);
  const wName = (currentGame.header.White  || 'White').slice(0, 14);
  const bName = (currentGame.header.Black  || 'Black').slice(0, 14);
  const wC = countByCategory(annotations, moves, 'w');
  const bC = countByCategory(annotations, moves, 'b');

  bar.innerHTML = `
    <div id="accuracy-section">
      <div class="acc-label">Accuracies</div>
      <div class="acc-row">
        <div class="acc-block">
          <div class="acc-name">${wName}</div>
          <div class="acc-pct">${wAcc}%</div>
        </div>
        <div class="acc-block acc-black">
          <div class="acc-name">${bName}</div>
          <div class="acc-pct">${bAcc}%</div>
        </div>
      </div>
    </div>
    <table class="class-table">
      <thead><tr><th>${wName}</th><th></th><th>${bName}</th></tr></thead>
      <tbody>
        <tr><td>${wC.best}</td>      <td><span class="badge badge-best">★ Best</span></td>           <td>${bC.best}</td></tr>
        <tr><td>${wC.inaccuracy}</td><td><span class="badge badge-inaccuracy">?! Inaccuracy</span></td><td>${bC.inaccuracy}</td></tr>
        <tr><td>${wC.mistake}</td>   <td><span class="badge badge-mistake">? Mistake</span></td>     <td>${bC.mistake}</td></tr>
        <tr><td>${wC.blunder}</td>   <td><span class="badge badge-blunder">?? Blunder</span></td>    <td>${bC.blunder}</td></tr>
      </tbody>
    </table>
  `;
  bar.classList.add('visible');
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function formatEval(cp) {
  if (Math.abs(cp) >= 90000) {
    const side = cp > 0 ? '' : '-';
    return side + 'M' + Math.ceil((900000 - Math.abs(cp)) / 2);
  }
  const pawns = cp / 100;
  return (pawns >= 0 ? '+' : '') + pawns.toFixed(1);
}

function formatTimeControl(tc, tcClass) {
  if (!tc) return tcClass || '?';
  const parts = tc.split('+');
  const base = parseInt(parts[0]);
  const inc  = parts[1] ? '+' + parts[1] : '';
  const mins = Math.floor(base / 60);
  const secs = base % 60;
  return (secs === 0 ? mins + 'm' : `${mins}:${String(secs).padStart(2,'0')}`) + inc;
}

function extractOpening(pgn) {
  const m = pgn.match(/\[Opening "([^"]+)"\]/);
  return m ? m[1] : '';
}
