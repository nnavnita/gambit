<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambit Chess</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♞</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 16px 24px;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; }
  header span { font-size: 1.6rem; }
  .badge {
    margin-left: auto;
    font-size: 0.75rem;
    color: #888;
    background: #0f0f1a;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #2a2a4a;
  }

  main {
    display: flex;
    gap: 24px;
    padding: 32px 24px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── Board ────────────────────────────────── */
  #board-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .rank-labels, .file-labels {
    display: flex;
    color: #888;
    font-size: 0.7rem;
    font-weight: 600;
    user-select: none;
  }
  .rank-labels { flex-direction: column; justify-content: space-around; width: 16px; }
  .rank-labels span { height: 70px; display: flex; align-items: center; justify-content: center; }
  .file-labels { width: 560px; justify-content: space-around; padding: 0 0 0 16px; }
  .file-labels span { width: 70px; text-align: center; }

  #board-row { display: flex; }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 70px);
    grid-template-rows: repeat(8, 70px);
    border: 2px solid #3a3a5a;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  .sq {
    width: 70px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: filter 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }

  .sq img {
    width: 82%;
    height: 82%;
    pointer-events: none;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
  }
  .sq:hover { filter: brightness(1.15); }
  .sq.light { background: #f0d9b5; }
  .sq.dark  { background: #b58863; }
  .sq.selected { background: #7fc97f !important; }
  .sq.last-move { background: #cdd16e !important; }
  .sq.check { background: #e05555 !important; }

  /* legal move dot */
  .sq.legal-move::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.25);
    border-radius: 50%;
    pointer-events: none;
  }
  .sq.legal-capture::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 5px solid rgba(0,0,0,0.25);
    border-radius: 0;
    pointer-events: none;
  }

  /* ── Sidebar ──────────────────────────────── */
  #sidebar {
    width: 240px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    padding: 16px;
  }

  #status-text {
    font-size: 1rem;
    font-weight: 600;
    min-height: 1.5em;
  }
  #status-text.thinking { color: #f0a500; }
  #status-text.win  { color: #4caf50; }
  #status-text.lose { color: #e05555; }
  #status-text.draw { color: #888; }

  .thinking-dots::after {
    content: '';
    animation: dots 1.2s steps(3, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }

  .controls { display: flex; flex-direction: column; gap: 10px; }
  button {
    background: #e94560;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 9px 14px;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 600;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover  { background: #c73652; }
  button:active { transform: scale(0.97); }
  button.secondary {
    background: #2a2a4a;
    color: #c0c0e0;
  }
  button.secondary:hover { background: #3a3a5a; }

  .difficulty-btn.active {
    outline: 2px solid #e94560;
    outline-offset: 2px;
  }

  .panel-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    margin-bottom: 10px;
  }

  #move-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-height: 300px;
    overflow-y: auto;
    font-size: 0.85rem;
  }
  .move-row {
    display: flex;
    gap: 6px;
    align-items: baseline;
  }
  .move-num { color: #555; min-width: 24px; }
  .move-san { padding: 2px 6px; border-radius: 4px; cursor: default; }
  .move-san:hover { background: #2a2a4a; }
  .move-san.white-move { color: #e0e0e0; }
  .move-san.black-move { color: #aaa; }
  .move-san.last { background: #2a2a4a; }

  /* loading overlay */
  #loading {
    position: fixed; inset: 0;
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
    font-size: 1rem;
    color: #888;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #2a2a4a;
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Score rows in status panel ─────────────── */
  .score-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 1px;
    margin-top: 6px;
    padding: 4px 6px;
    background: #2a2a4a;
    border-radius: 5px;
  }
  .score-row img { width: 18px; height: 18px; opacity: 0.9; }
  .score-row .score-adv {
    margin-left: 4px;
    font-size: 0.8rem;
    font-weight: 700;
    color: #e94560;
  }

  /* ── Promotion picker ────────────────────────── */
  #promo-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  #promo-box {
    background: #1a1a2e;
    border: 1px solid #3a3a5a;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #promo-box h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
  }
  #promo-pieces {
    display: flex;
    gap: 8px;
  }
  .promo-piece {
    width: 64px;
    height: 64px;
    background: #2a2a4a;
    border: 2px solid transparent;
    border-radius: 8px;
    padding: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .promo-piece:hover { background: #3a3a5a; border-color: #e94560; }
  .promo-piece img { width: 100%; height: 100%; }

  @media (max-width: 640px) {
    main { padding: 16px 8px; gap: 16px; }
    #board { grid-template-columns: repeat(8, 44px); grid-template-rows: repeat(8, 44px); }
    .sq { width: 44px; height: 44px; }
    .file-labels { width: 352px; }
    .file-labels span { width: 44px; }
    .rank-labels span { height: 44px; }
    #sidebar { width: 352px; }
  }
</style>
</head>
<body>

<!-- Promotion picker -->
<div id="promo-overlay">
  <div id="promo-box">
    <h3>Promote pawn</h3>
    <div id="promo-pieces"></div>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading Gambit engine…</span>
</div>

<header>
  <img src="https://lichess1.org/assets/piece/cburnett/wN.svg" style="height:32px;width:32px" alt="knight">
  <h1>Gambit</h1>
  <nav style="margin-left:auto;display:flex;gap:8px;">
    <a href="index.html" style="color:#fff;text-decoration:none;font-size:0.85rem;padding:6px 14px;border-radius:6px;background:#e94560;font-weight:600;">Play</a>
    <a href="analysis.html" style="color:#aaa;text-decoration:none;font-size:0.85rem;padding:6px 14px;border-radius:6px;border:1px solid #2a2a4a;">Analysis</a>
    <a href="puzzles.html" style="color:#aaa;text-decoration:none;font-size:0.85rem;padding:6px 14px;border-radius:6px;border:1px solid #2a2a4a;">Puzzle</a>
  </nav>
</header>

<main>
  <div id="board-wrap">
    <div class="file-labels" id="file-labels">
      <span>a</span><span>b</span><span>c</span><span>d</span>
      <span>e</span><span>f</span><span>g</span><span>h</span>
    </div>
    <div id="board-row">
      <div class="rank-labels" id="rank-labels">
        <span>8</span><span>7</span><span>6</span><span>5</span>
        <span>4</span><span>3</span><span>2</span><span>1</span>
      </div>
      <div id="board"></div>
    </div>
  </div>

  <div id="sidebar">
    <div class="panel">
      <div class="panel-title">Status</div>
      <div id="status-text">Loading…</div>
      <div id="score-black" class="score-row" style="display:none;"></div>
      <div id="score-white" class="score-row" style="display:none;"></div>
    </div>

    <div class="panel controls">
      <button id="btn-new">New Game</button>
      <div>
        <div class="panel-title" style="margin-bottom:6px">Play as</div>
        <div style="display:flex;gap:6px;">
          <button id="btn-white" class="secondary" style="flex:1;font-size:0.78rem;padding:7px 4px;">♔ White</button>
          <button id="btn-random" class="secondary" style="flex:1;font-size:0.78rem;padding:7px 4px;">? Random</button>
          <button id="btn-black" class="secondary" style="flex:1;font-size:0.78rem;padding:7px 4px;">♚ Black</button>
        </div>
      </div>
      <button id="btn-flip" class="secondary">Flip Board</button>
      <div>
        <div class="panel-title" style="margin-bottom:6px">Difficulty</div>
        <div style="display:flex;gap:6px;">
          <button id="btn-beginner"     class="secondary difficulty-btn" style="flex:1;font-size:0.75rem;padding:7px 2px;">Baby Gambit</button>
          <button id="btn-intermediate" class="secondary difficulty-btn active" style="flex:1;font-size:0.75rem;padding:7px 2px;">Gambit</button>
          <button id="btn-advanced"     class="secondary difficulty-btn" style="flex:1;font-size:0.75rem;padding:7px 2px;">Dark Gambit</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Moves</div>
      <div id="move-list"></div>
    </div>
  </div>
</main>

<script type="module">
import { Chess } from 'https://esm.sh/chess.js@1';

// ── State ──────────────────────────────────────────────────────────────────
let chess = new Chess();
let flipped = false;
let selected = null;
let legalDests = [];
let lastMove = null;
let thinking = false;
let difficulty = 'intermediate'; // 'beginner' | 'intermediate' | 'advanced'
let pendingMoveResolve = null;
let playerColor = 'w'; // 'w' or 'b'

const DIFFICULTY_DEPTH = { beginner: 1, intermediate: 3, advanced: 6 };
// Beginner: 35% of moves are random (simulates blundering)
const DIFFICULTY_RANDOM_RATE = { beginner: 0.35, intermediate: 0, advanced: 0 };

// Lichess open-source piece set (cburnett, MIT licence)
const PIECE_URL = (color, type) =>
  `https://lichess1.org/assets/piece/cburnett/${color}${type.toUpperCase()}.svg`;

// ── Worker ─────────────────────────────────────────────────────────────────
const worker = new Worker('./worker.js', { type: 'module' });

worker.onmessage = (e) => {
  if (e.data.type === 'ready') {
    document.getElementById('loading').style.display = 'none';
    updateColorButtons();
    renderBoard();
    updateStatus();
  }
  if (e.data.type === 'move' && pendingMoveResolve) {
    pendingMoveResolve(e.data.move);
    pendingMoveResolve = null;
  }
  if (e.data.type === 'init_error') {
    console.error('WASM init error:', e.data.message);
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('status-text');
    el.className = 'lose';
    el.textContent = 'Engine failed to load: ' + e.data.message;
  }
};

worker.onerror = (e) => {
  console.error('Engine worker crashed:', e.message || '(no message)', 'file:', e.filename, 'line:', e.lineno, e);
  if (pendingMoveResolve) {
    pendingMoveResolve('');
    pendingMoveResolve = null;
  }
  thinking = false;
  const el = document.getElementById('status-text');
  el.className = 'lose';
  el.innerHTML = 'Engine crashed. <a href="" style="color:#e94560">Reload</a> to restart.';
};

function engineMove(fen, d) {
  return new Promise(resolve => {
    const timer = setTimeout(() => {
      console.warn('Engine timed out');
      pendingMoveResolve = null;
      resolve('');
    }, 15000);

    pendingMoveResolve = (move) => {
      clearTimeout(timer);
      resolve(move);
    };
    worker.postMessage({ fen, depth: d });
  });
}

// ── Controls ───────────────────────────────────────────────────────────────
function startGame() {
  chess = new Chess();
  selected = null;
  legalDests = [];
  lastMove = null;
  thinking = false;
  flipped = playerColor === 'b';
  renderBoard();
  renderCaptured();
  updateStatus();
  renderHistory();
  updateColorButtons();
  // If player is black, engine moves first
  if (playerColor === 'b') triggerEngineMove();
}

function updateColorButtons() {
  document.getElementById('btn-white').style.outline  = playerColor === 'w' ? '2px solid #e94560' : '';
  document.getElementById('btn-black').style.outline  = playerColor === 'b' ? '2px solid #e94560' : '';
  document.getElementById('btn-random').style.outline = '';
}

document.getElementById('btn-new').onclick = startGame;

document.getElementById('btn-white').onclick = () => {
  playerColor = 'w';
  startGame();
};
document.getElementById('btn-random').onclick = () => {
  playerColor = Math.random() < 0.5 ? 'w' : 'b';
  startGame();
};
document.getElementById('btn-black').onclick = () => {
  playerColor = 'b';
  startGame();
};

document.getElementById('btn-flip').onclick = () => {
  flipped = !flipped;
  renderBoard();
  renderCaptured();
};

function setDifficulty(d) {
  difficulty = d;
  document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + d).classList.add('active');
}

document.getElementById('btn-beginner').onclick     = () => setDifficulty('beginner');
document.getElementById('btn-intermediate').onclick = () => setDifficulty('intermediate');
document.getElementById('btn-advanced').onclick     = () => setDifficulty('advanced');

// ── Board rendering ────────────────────────────────────────────────────────
function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  const inCheckSquare = chess.inCheck() ? kingSquare(chess.turn()) : null;

  for (let visualRow = 0; visualRow < 8; visualRow++) {
    for (let visualCol = 0; visualCol < 8; visualCol++) {
      const rank = flipped ? visualRow + 1 : 8 - visualRow;
      const file = flipped ? 8 - visualCol : visualCol + 1;
      const sq   = fileChar(file) + rank;

      const div = document.createElement('div');
      div.className = 'sq ' + ((rank + file) % 2 === 0 ? 'dark' : 'light');
      div.dataset.sq = sq;

      // Highlights
      if (sq === selected) div.classList.add('selected');
      else if (lastMove && (sq === lastMove.from || sq === lastMove.to))
        div.classList.add('last-move');
      if (sq === inCheckSquare) div.classList.add('check');

      // Legal move indicators
      if (legalDests.includes(sq)) {
        const hasPiece = chess.get(sq);
        div.classList.add(hasPiece ? 'legal-capture' : 'legal-move');
      }

      // Piece
      const piece = chess.get(sq);
      if (piece) {
        const img = document.createElement('img');
        img.src = PIECE_URL(piece.color, piece.type);
        img.alt = piece.color + piece.type;
        div.appendChild(img);
      }

      div.onclick = () => onSquareClick(sq);
      boardEl.appendChild(div);
    }
  }

  // Update coordinate labels when flipped
  const files = flipped
    ? ['h','g','f','e','d','c','b','a']
    : ['a','b','c','d','e','f','g','h'];
  const ranks = flipped
    ? ['1','2','3','4','5','6','7','8']
    : ['8','7','6','5','4','3','2','1'];
  const fileEls  = document.querySelectorAll('#file-labels span');
  const rankEls  = document.querySelectorAll('#rank-labels span');
  files.forEach((f, i) => fileEls[i].textContent = f);
  ranks.forEach((r, i) => rankEls[i].textContent = r);
}

// ── Click logic ────────────────────────────────────────────────────────────
function onSquareClick(sq) {
  if (thinking || chess.isGameOver()) return;
  if (chess.turn() !== playerColor) return;

  const piece = chess.get(sq);

  // If clicking a legal destination
  if (selected && legalDests.includes(sq)) {
    doMove(selected, sq);
    return;
  }

  // Select own piece
  if (piece && piece.color === playerColor) {
    selected = sq;
    legalDests = chess.moves({ square: sq, verbose: true }).map(m => m.to);
    renderBoard();
    return;
  }

  // Deselect
  selected = null;
  legalDests = [];
  renderBoard();
}

async function triggerEngineMove() {
  if (chess.isGameOver()) return;
  thinking = true;
  updateStatus();
  renderBoard();

  const depth = DIFFICULTY_DEPTH[difficulty];

  // Beginner: occasionally play a random legal move instead of the engine's choice
  let uciMove;
  if (Math.random() < DIFFICULTY_RANDOM_RATE[difficulty]) {
    const legalMoves = chess.moves({ verbose: true });
    if (legalMoves.length > 0) {
      const r = legalMoves[Math.floor(Math.random() * legalMoves.length)];
      uciMove = r.from + r.to + (r.promotion || '');
    }
  }
  uciMove = uciMove || await engineMove(chess.fen(), depth);
  thinking = false;

  if (uciMove && uciMove.length >= 4 && uciMove.slice(0,2) !== uciMove.slice(2,4)) {
    const ef   = uciMove.slice(0, 2);
    const et   = uciMove.slice(2, 4);
    const epro = uciMove.length > 4 ? uciMove[4] : 'q';
    try {
      const emove = chess.move({ from: ef, to: et, promotion: epro });
      if (emove) {
        lastMove = { from: ef, to: et };
        if (chess.isCheckmate()) playGameOverSound();
        else if (chess.inCheck()) playCheckSound();
        else if (emove.captured) playCaptureSound();
        else playMoveSound();
      }
    } catch (err) {
      console.error('Engine returned illegal move:', uciMove, err);
    }
  }

  renderBoard();
  renderHistory();
  renderCaptured();
  updateStatus();
}

function isPromotionMove(from, to) {
  const piece = chess.get(from);
  if (!piece || piece.type !== 'p') return false;
  const toRank = parseInt(to[1]);
  return (piece.color === 'w' && toRank === 8) || (piece.color === 'b' && toRank === 1);
}

function pickPromotion(color) {
  return new Promise(resolve => {
    const overlay = document.getElementById('promo-overlay');
    const container = document.getElementById('promo-pieces');
    container.innerHTML = '';
    for (const p of ['q', 'r', 'b', 'n']) {
      const btn = document.createElement('button');
      btn.className = 'promo-piece';
      const img = document.createElement('img');
      img.src = PIECE_URL(color, p);
      img.alt = p;
      btn.appendChild(img);
      btn.onclick = () => { overlay.style.display = 'none'; resolve(p); };
      container.appendChild(btn);
    }
    overlay.style.display = 'flex';
  });
}

async function doMove(from, to) {
  let promotion = 'q';
  if (isPromotionMove(from, to)) {
    promotion = await pickPromotion(playerColor);
  }

  const move = chess.move({ from, to, promotion });
  if (!move) return;

  lastMove = { from, to };
  selected = null;
  legalDests = [];

  if (chess.isCheckmate()) playGameOverSound();
  else if (chess.inCheck()) playCheckSound();
  else if (move.captured) playCaptureSound();
  else playMoveSound();

  renderBoard();
  renderHistory();
  renderCaptured();
  updateStatus();

  if (chess.isGameOver()) return;

  await triggerEngineMove();
}

// renderCaptured delegates to updateScore (board rows removed)
function renderCaptured() { updateScore(); }

function updateScore() {
  const hist = chess.history({ verbose: true });
  const order = { q: 9, r: 5, b: 3, n: 3, p: 1 };
  const capturedByWhite = []; // black pieces white took
  const capturedByBlack = []; // white pieces black took
  for (const m of hist) {
    if (m.captured) {
      if (m.color === 'w') capturedByWhite.push(m.captured);
      else capturedByBlack.push(m.captured);
    }
  }
  capturedByWhite.sort((a, b) => (order[b] || 0) - (order[a] || 0));
  capturedByBlack.sort((a, b) => (order[b] || 0) - (order[a] || 0));

  const wMat = capturedByWhite.reduce((s, p) => s + (order[p] || 0), 0);
  const bMat = capturedByBlack.reduce((s, p) => s + (order[p] || 0), 0);
  const diff = wMat - bMat;

  // score-white shows white's captures (+N means white ahead)
  // green if the player is white (player winning), red if player is black (player losing)
  fillScoreRow('score-white', capturedByWhite, 'b', diff > 0 ? diff : 0, playerColor === 'w');
  // score-black shows black's captures (+N means black ahead)
  // green if the player is black (player winning), red if player is white (player losing)
  fillScoreRow('score-black', capturedByBlack, 'w', diff < 0 ? -diff : 0, playerColor === 'b');
}

function fillScoreRow(id, pieces, color, adv, winning) {
  const el = document.getElementById(id);
  if (pieces.length === 0 && adv === 0) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = '';
  for (const p of pieces) {
    const img = document.createElement('img');
    img.src = PIECE_URL(color, p);
    el.appendChild(img);
  }
  if (adv > 0) {
    const span = document.createElement('span');
    span.className = 'score-adv';
    span.style.color = winning ? '#4caf50' : '#e05555';
    span.textContent = '+' + adv;
    el.appendChild(span);
  }
}

// ── Status ─────────────────────────────────────────────────────────────────
function updateStatus() {
  const el = document.getElementById('status-text');
  el.className = '';

  if (thinking) {
    el.className = 'thinking thinking-dots';
    const botName = { beginner: 'Baby Gambit', intermediate: 'Gambit', advanced: 'Dark Gambit' }[difficulty];
    el.textContent = botName + ' is thinking';
    return;
  }
  if (chess.isCheckmate()) {
    const winner = chess.turn() === 'w' ? 'Black' : 'White';
    const playerWon = (winner === 'White') === (playerColor === 'w');
    el.className = playerWon ? 'win' : 'lose';
    el.textContent = winner + ' wins by checkmate!';
    return;
  }
  if (chess.isDraw()) {
    el.className = 'draw';
    if (chess.isStalemate())       el.textContent = 'Draw — stalemate';
    else if (chess.isThreefoldRepetition()) el.textContent = 'Draw — threefold repetition';
    else if (chess.isInsufficientMaterial()) el.textContent = 'Draw — insufficient material';
    else el.textContent = 'Draw';
    return;
  }
  if (chess.inCheck()) {
    el.textContent = (chess.turn() === 'w' ? 'White' : 'Black') + ' is in check!';
    return;
  }
  const botName = { beginner: 'Baby Gambit', intermediate: 'Gambit', advanced: 'Dark Gambit' }[difficulty];
  el.textContent = chess.turn() === playerColor ? 'Your turn' : botName + ' thinking…';
}

// ── History ────────────────────────────────────────────────────────────────
function renderHistory() {
  const hist = chess.history();
  const el   = document.getElementById('move-list');
  el.innerHTML = '';

  for (let i = 0; i < hist.length; i += 2) {
    const row = document.createElement('div');
    row.className = 'move-row';

    const num = document.createElement('span');
    num.className = 'move-num';
    num.textContent = (i / 2 + 1) + '.';
    row.appendChild(num);

    const w = document.createElement('span');
    w.className = 'move-san white-move' + (i === hist.length - 1 ? ' last' : '');
    w.textContent = hist[i];
    row.appendChild(w);

    if (hist[i + 1] !== undefined) {
      const b = document.createElement('span');
      b.className = 'move-san black-move' + (i + 1 === hist.length - 1 ? ' last' : '');
      b.textContent = hist[i + 1];
      row.appendChild(b);
    }

    el.appendChild(row);
  }
  el.scrollTop = el.scrollHeight;
}

// ── Sound system ───────────────────────────────────────────────────────────
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function noise(ctx, t, duration, volume, freqStart, freqEnd) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freqStart, t);
  osc.frequency.exponentialRampToValueAtTime(freqEnd, t + duration);
  gain.gain.setValueAtTime(volume, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + duration);
}

function playMoveSound() {
  // thok — short mid tap, slight drop
  try { const ctx = getAudioCtx(), t = ctx.currentTime;
    noise(ctx, t, 0.07, 0.3, 300, 200); } catch(e) {}
}

function playCaptureSound() {
  // glomp — low, rounder, longer
  try { const ctx = getAudioCtx(), t = ctx.currentTime;
    noise(ctx, t, 0.15, 0.4, 180, 80); } catch(e) {}
}

function playCheckSound() {
  // plomp — deep low thud
  try { const ctx = getAudioCtx(), t = ctx.currentTime;
    noise(ctx, t, 0.4, 0.5, 120, 55); } catch(e) {}
}

function playGameOverSound() {
  // thwak — sharp crack
  try { const ctx = getAudioCtx(), t = ctx.currentTime;
    noise(ctx, t, 0.05, 0.45, 600, 350);
    noise(ctx, t + 0.05, 0.08, 0.2, 350, 200); } catch(e) {}
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fileChar(n) { return 'abcdefgh'[n - 1]; }

function kingSquare(color) {
  for (const file of 'abcdefgh') {
    for (const rank of '12345678') {
      const p = chess.get(file + rank);
      if (p && p.type === 'k' && p.color === color) return file + rank;
    }
  }
  return null;
}
